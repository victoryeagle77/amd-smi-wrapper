name: Wrapper CI

on: [pull_request, push]

env:
  CARGO_TERM_COLOR: always

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Spell check everything
      uses: streetsidesoftware/cspell-action@v6
      with:
        root: .
        incremental_files_only: true
        config: .cspell.json
        verbose: true

    - name: Markdown lint
      uses: DavidAnson/markdownlint-cli2-action@v19
      with:
        config: .markdownlint.jsonc
        globs: |
          *.md
          **/*.md

  builder:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Check formatting
      run: cargo fmt --check

    - name: Run Clippy linter
      run: cargo clippy --no-deps

    - name: Build all libraries
      run: cargo build

    - name: Install dependencies to cross-compile wrapper
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libclang-dev gcc-aarch64-linux-gnu
        rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu

    - name: Cross build for x86_64 architecture
      run: cargo build --target=x86_64-unknown-linux-gnu

    - name: Cross build for arm64 architecture
      run: cargo build --target=aarch64-unknown-linux-gnu

  tester:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Compile Tests
      run: cargo test --all-features --no-run

    - name: Run Tests (including doc tests)
      run: cargo test --all-features -- --nocapture
